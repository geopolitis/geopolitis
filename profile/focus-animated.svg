<svg width="900" height="74" viewBox="0 0 900 74" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Engineering focus</title>
  <desc id="desc">Animated statement about building resilient platforms, improving delivery systems, strengthening security, and applying AI in practical engineering environments.</desc>
  <style>
    .bg { fill: #f6f8fa; stroke: #d0d7de; }
    .text { font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24292f; }
    .accent { fill: #0969da; }
    .line { opacity: 0; animation: fade 12s ease-in-out infinite; }
    .line2 { animation-delay: 3s; }
    .line3 { animation-delay: 6s; }
    .line4 { animation-delay: 9s; }
    @keyframes fade {
      0% { opacity: 0; }
      6% { opacity: 1; }
      19% { opacity: 1; }
      25% { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
  <rect class="bg" x="1" y="1" width="898" height="72" rx="12" />
  <circle class="accent" cx="34" cy="37" r="6" />
  <g transform="translate(56 43)">
    <text class="text line" x="0" y="0">I build resilient platforms.</text>
    <text class="text line line2" x="0" y="0">I improve delivery systems.</text>
    <text class="text line line3" x="0" y="0">I strengthen security.</text>
    <text class="text line line4" x="0" y="0">I apply AI in practical engineering environments.</text>
  </g>
</svg>
